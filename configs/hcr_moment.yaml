model_type: hcr_moment
dataset: huggingface
hf_dataset: Trelis/tiny-shakespeare
hf_config: default
hf_split: train
hf_max_rows: 1000
output_dir: runs/hcr_moment
context_length: 128
batch_size: 32
d_model: 128
n_layers: 4
n_heads: 4
mlp_ratio: 4
dropout: 0.1
learning_rate: 0.0003
weight_decay: 0.1
max_steps: 5000
eval_interval: 250
eval_batches: 10
log_interval: 25
grad_clip: 1.0
task: causal
variance_noncollapse_weight: 0.0001
moment_smoothness_weight: 0.0001
