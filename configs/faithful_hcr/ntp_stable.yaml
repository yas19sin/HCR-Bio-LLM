model_type: hcr_blockwise_joint
dataset: huggingface
hf_dataset: Trelis/tiny-shakespeare
hf_config: default
hf_split: train
hf_max_rows: 1000
output_dir: runs/faithful_hcr/ntp_stable
experiment_family: faithful_hcr_ntp
seed: 1337
context_length: 128
batch_size: 32
d_model: 488
n_layers: 4
n_heads: 8
dropout: 0.1
learning_rate: 0.0002
weight_decay: 0.1
max_steps: 10000
eval_interval: 500
eval_batches: 20
log_interval: 250
grad_clip: 0.5
task: causal
hcr_block_size: 2
hcr_degree: 2
hcr_output_scale: 0.1
hcr_density_state_mix: 0.5
hcr_denominator_stability_weight: 0.0001
hcr_denominator_min_abs: 0.05
hcr_denominator_negative_weight: 0.1
hcr_coefficient_rms_weight: 0.0001
hcr_coefficient_max_rms: 4.0
hcr_variance_bound_weight: 0.0001
hcr_variance_max: 0.25
sample_at_end: false
stdout: compact
stdout_events: start,eval,final
